name: 💡 Feature request
description: Suggest an idea or improvement for Perch.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem or need?
      description: What are you trying to do that Perch doesn't help with yet?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like Perch to do?
      description: Describe the feature or change you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds
      description: Anything you do today to get around it?
    validations:
      required: false
